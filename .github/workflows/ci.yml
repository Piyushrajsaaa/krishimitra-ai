name: KrishiMitra AI CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: pip

    - name: Install CPU-only PyTorch first
      run: |
        pip install torch==2.3.0+cpu torchvision==0.18.0+cpu           --extra-index-url https://download.pytorch.org/whl/cpu

    - name: Install remaining dependencies
      run: |
        pip install --upgrade pip
        pip install fastapi==0.111.0 uvicorn==0.29.0           python-multipart==0.0.9 slowapi==0.1.9           streamlit==1.35.0 Pillow==10.3.0           sentence-transformers==2.7.0 chromadb           python-dotenv pydantic==2.7.1 pydantic-settings           sqlalchemy==2.0.30 aiofiles httpx==0.27.0           pytest==8.2.0 pytest-asyncio==0.23.7           pytest-cov==5.0.0 httpx2

    - name: Setup environment
      run: cp .env.example .env

    - name: Setup knowledge base
      run: python scripts/ingest_knowledge.py

    - name: Setup demo dataset
      run: python scripts/download_dataset.py

    - name: Run unit tests only
      run: |
        pytest tests/unit/ -v --tb=short           --ignore=tests/unit/test_model.py           -x

    - name: Run model tests
      run: pytest tests/unit/test_model.py -v --tb=short

    - name: Run integration tests
      run: pytest tests/integration/ -v --tb=short

    - name: Full test suite with coverage
      run: |
        pytest tests/ -v --tb=short           --cov=app           --cov-report=xml           --cov-fail-under=70

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install flake8
      run: pip install flake8

    - name: Lint with flake8
      run: |
        flake8 app/ tests/ scripts/           --max-line-length=120           --extend-ignore=E501,W503,E303,W291,E302,E305,W293,F401           --exclude=__pycache__,.venv,venv
      continue-on-error: true
