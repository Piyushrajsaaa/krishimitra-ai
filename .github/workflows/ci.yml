name: KrishiMitra AI CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: pip-${{ hashFiles('requirements.txt') }}
        restore-keys: pip-

    - name: Install core dependencies
      run: |
        pip install --upgrade pip
        pip install torch==2.3.0+cpu torchvision==0.18.0+cpu           --extra-index-url https://download.pytorch.org/whl/cpu           --quiet

    - name: Install app dependencies
      run: |
        pip install           fastapi==0.111.0 uvicorn==0.29.0           python-multipart==0.0.9 slowapi==0.1.9           Pillow==10.3.0 pydantic==2.7.1           pydantic-settings python-dotenv           sentence-transformers==2.7.0 chromadb           sqlalchemy==2.0.30 aiofiles           httpx==0.27.0 httpx2           pytest==8.2.0 pytest-asyncio==0.23.7           pytest-cov==5.0.0 --quiet

    - name: Create .env file
      run: cp .env.example .env

    - name: Build knowledge base
      run: python scripts/ingest_knowledge.py

    - name: Build demo dataset
      run: python scripts/download_dataset.py

    - name: Run schema tests
      run: pytest tests/unit/test_schemas.py -v --tb=short

    - name: Run health tests
      run: pytest tests/unit/test_health.py -v --tb=short

    - name: Run model tests
      run: pytest tests/unit/test_model.py -v --tb=short

    - name: Run RAG tests
      run: pytest tests/unit/test_rag.py -v --tb=short

    - name: Run LLM tests
      run: pytest tests/unit/test_llm.py -v --tb=short

    - name: Run integration tests
      run: pytest tests/integration/ -v --tb=short

    - name: Full suite summary
      run: |
        pytest tests/ --tb=short -q           --cov=app --cov-report=term-missing

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install flake8
      run: pip install flake8

    - name: Lint with flake8
      run: |
        flake8 app/ tests/ scripts/           --max-line-length=120           --extend-ignore=E501,W503,E303,W291,E302,E305,W293,F401,E711,W292           --exclude=__pycache__,.venv,venv
      continue-on-error: true
