name: KrishiMitra AI CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.3.0+cpu torchvision==0.18.0+cpu --extra-index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt

    - name: Setup environment
      run: cp .env.example .env

    - name: Setup knowledge base
      run: python scripts/ingest_knowledge.py

    - name: Setup demo dataset
      run: python scripts/download_dataset.py

    - name: Run unit tests
      run: pytest tests/unit/ -v --tb=short

    - name: Run integration tests
      run: pytest tests/integration/ -v --tb=short

    - name: Run full test suite with coverage
      run: pytest tests/ --cov=app --cov-report=xml --cov-fail-under=75 -v

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: pip install flake8

    - name: Lint with flake8
      run: |
        flake8 app/ tests/ scripts/           --max-line-length=120           --extend-ignore=E501,W503,E303,W291,E302,E305,W293           --exclude=__pycache__,.venv,venv,migrations
      continue-on-error: true
